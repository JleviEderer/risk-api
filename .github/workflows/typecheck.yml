name: Typecheck

on:
  push:

jobs:
  pyright:
    name: Pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyright
      - name: Run pyright
        run: python -m pyright src/ tests/
